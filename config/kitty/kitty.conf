#
# theme
#
include ./themes/frappe.conf

#
# font
#
font_size 22.0
font_family SauceCodePro Nerd Font Mono Medium
bold_font auto
italic_font auto
bold_italic_font auto

#
# settings
#
copy_on_select yes
enable_audio_bell no

#
# keybindings
#
map cmd+t       new_tab_with_cwd
map ctrl+t new_tab_with_cwd !neighbor
