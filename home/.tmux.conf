# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# Bindings:
# - to see current bindings:
#   tmux list-keys

# Reload tmux config
unbind r
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Open new/split panes with the path of the current pane.
unbind-key c
bind-key c new-window -c '#{pane_current_path}'
bind-key - split-window -v -c '#{pane_current_path}'
bind-key | split-window -h -c '#{pane_current_path}'

# Vim-like key bindings for pane navigation (default uses cursor keys).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Shift + arrow to move between windows in a session
bind -n S-left previous-window
bind -n S-Right next-window

bind-key / copy-mode \; send-key ?

# Resizing (mouse also works).
unbind-key Left
bind-key -r Left resize-pane -L 5
unbind-key Right
bind-key -r Right resize-pane -R 5
unbind-key Down
bind-key -r Down resize-pane -D 5
unbind-key Up
bind-key -r Up resize-pane -U 5

set -g default-terminal "xterm-kitty"
set-option -ga terminal-overrides ',xterm-*:Tc'
set-option -g focus-events on

# Status bar.
set-option -g status-style 'bg=#282828,fg=#ebdbb2'
set-option -g status-left-length 40
set-option -g status-left '#[fg=yellow,bold,italics]#S § ' # SECTION SIGN (UTF-8: c2 a7)
set-option -g status-right "#[fg=#ebdbb2,italics]$USER #[fg=yellow,bold]%l:%M %p"
set-option -g status-interval 60 # Default is 15.
setw -g window-status-current-style 'bg=#fb4934,bold,italics fg=#282828'


set -sg escape-time 0

# Automatically renumber window numbers on closing a pane (tmux >= 1.7).
set-option -g renumber-windows on

# Mouse can be used to select panes, select windows (by clicking on the status
# bar), resize panes. For default bindings see `tmux list-keys`.
set-option -g mouse on

set-option -g history-limit 10000

# Dynamically update iTerm tab and window titles.
set-option -g set-titles on

# - #S = session name
# - #T = pane title (~/.zshrc sets this to the last/current command)
set-option -g set-titles-string "#S > #T"

# But don't change tmux's own window titles.
set-option -w -g automatic-rename off

# Show bells in window titles.
set-option -g window-status-bell-style fg=yellow,bold,underscore

# Turn off distracting border highlight.
set-option -ga pane-active-border-style bg=default,fg=default

setw -gq utf8 on

# start numbering windows and panes from 1
set -g base-index 1
setw -g pane-base-index 1

set -s set-clipboard on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

bind-key C-l clear-history
bind -n C-p display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
bind t display-popup -E "tmx"
bind w display-popup -E "tmx-wt"
bind d display-popup -E -w90% -h80% "git diff"
bind g display-popup -E -w90% -h80% "git add --patch && git commit"
